<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Reuse Mapping</title>
<style>
:root {
  --bg:#08080c;--surface:rgba(255,255,255,0.03);--surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.06);--border-accent:rgba(255,255,255,0.12);
  --text:#ededef;--text-secondary:rgba(255,255,255,0.55);--text-tertiary:rgba(255,255,255,0.3);
  --accent-1:#f59e0b;--accent-2:#ef4444;--accent-3:#34d399;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--cyan:#06b6d4;--purple:#a855f7;
  --font-mono:'SF Mono','Fira Code','JetBrains Mono',monospace;
  --font-sans:-apple-system,'Inter',system-ui,sans-serif;
  --radius:12px;--transition:cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(245,158,11,0.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(52,211,153,0.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{max-width:920px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

.header{text-align:center;padding:3rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem}
.header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.02em;margin-bottom:.75rem}
.header .subtitle{color:var(--text-secondary);font-size:.95rem;max-width:640px;margin:0 auto}

/* Legend */
.legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:2rem;backdrop-filter:blur(12px)}
.legend h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:.75rem}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem}
.legend-item{display:flex;align-items:flex-start;gap:.5rem;font-size:.8rem;color:var(--text-secondary);line-height:1.5}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:4px}
.legend-dot.copy{background:var(--green)}
.legend-dot.template{background:var(--amber)}
.legend-dot.adapt{background:var(--cyan)}
.legend-dot.inspire{background:var(--purple)}

/* Filter bar */
.filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.filter-label{font-size:.75rem;color:var(--text-tertiary);margin-right:.25rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.filter-btn{padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:.75rem;cursor:pointer;transition:all .2s var(--transition);font-family:var(--font-sans)}
.filter-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-accent)}
.filter-btn.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:var(--accent-1)}
.filter-btn.active-copy{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.25);color:var(--green)}
.filter-btn.active-template{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:var(--amber)}
.filter-btn.active-adapt{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.25);color:var(--cyan)}
.filter-btn.active-inspire{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.25);color:var(--purple)}

/* Search */
.search-wrap{position:relative;margin-bottom:1.5rem}
.search-input{width:100%;padding:.65rem 1rem .65rem 2.25rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-family:var(--font-sans);outline:none;transition:border-color .2s var(--transition);backdrop-filter:blur(8px)}
.search-input:focus{border-color:var(--accent-1)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:.8rem;pointer-events:none}

/* Pattern card */
.pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;backdrop-filter:blur(12px);overflow:hidden;transition:border-color .3s var(--transition)}
.pattern-card:hover{border-color:var(--border-accent)}
.pattern-card.hidden{display:none}

.pattern-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.pattern-header:hover{background:var(--surface-hover)}
.p-num{font-family:var(--font-mono);font-size:.7rem;color:var(--accent-1);flex-shrink:0}
.p-name{font-size:1rem;font-weight:600;flex:1}
.p-arrow{font-size:.75rem;color:var(--text-tertiary);transition:transform .3s var(--transition)}
.pattern-card.open .p-arrow{transform:rotate(180deg)}

.pattern-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)}
.pattern-card.open .pattern-body{display:block}

/* Reuse badge */
.reuse-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:5px;font-size:.68rem;font-weight:600;letter-spacing:.02em;flex-shrink:0}
.reuse-badge.copy{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.reuse-badge.template{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.reuse-badge.adapt{background:rgba(6,182,212,0.12);color:var(--cyan);border:1px solid rgba(6,182,212,0.2)}
.reuse-badge.inspire{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.2)}

/* Sections */
.a-section{margin-top:1.25rem}
.sec-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:.5rem;font-weight:600;display:flex;align-items:center;gap:.4rem}
.sec-label.accent{color:var(--accent-1)}
.a-text{color:var(--text-secondary);font-size:.88rem;line-height:1.85}
.a-text strong{color:var(--text);font-weight:600}
.a-text em{color:var(--accent-1);font-style:normal;font-weight:500}

/* Reuse instruction */
.reuse-instr{background:rgba(0,0,0,0.25);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:.6rem .9rem;margin:.6rem 0;font-size:.82rem;color:var(--text-secondary);line-height:1.6}
.reuse-instr.tmpl{border-left-color:var(--amber)}
.reuse-instr.adpt{border-left-color:var(--cyan)}
.reuse-instr.insp{border-left-color:var(--purple)}
.reuse-instr strong{color:var(--text)}

/* Sub-toggle */
.sub-toggle{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;cursor:pointer;user-select:none;border:none;background:none;color:var(--text);font-size:.85rem;font-weight:500;width:100%;text-align:left;border-bottom:1px solid var(--border);transition:color .2s var(--transition)}
.sub-toggle:hover{color:var(--accent-1)}
.sub-toggle .sa{font-size:.65rem;color:var(--text-tertiary);transition:transform .3s var(--transition)}
.sub-toggle.open .sa{transform:rotate(90deg)}
.sub-content{display:none;padding:.75rem 0}
.sub-toggle.open+.sub-content{display:block}

/* Code blocks */
.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:.85rem 1.1rem;overflow-x:auto;font-family:var(--font-mono);font-size:.76rem;line-height:1.6;color:var(--text-secondary);margin-top:.6rem;white-space:pre-wrap;word-break:break-word}
.code-block .kw{color:#c678dd}.code-block .fn{color:#61afef}.code-block .str{color:#98c379}.code-block .num{color:#d19a66}.code-block .cmt{color:rgba(255,255,255,0.25);font-style:italic}.code-block .hl{background:rgba(245,158,11,0.1);display:inline;padding:.1em .2em;border-radius:3px}
.code-block .good{color:var(--green)}.code-block .bad{color:var(--red)}
.code-block .bi{color:var(--cyan)}

.code-src{font-size:.7rem;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:.4rem}
.code-src .fr{color:var(--cyan)}

/* Mapping table */
.map-table{width:100%;border-collapse:collapse;font-size:.8rem;margin:.6rem 0}
.map-table th{text-align:left;padding:.4rem .6rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-tertiary);border-bottom:1px solid var(--border);font-weight:600}
.map-table td{padding:.4rem .6rem;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-secondary);vertical-align:top}
.map-table tr:last-child td{border-bottom:none}

/* Skill tag */
.sk{display:inline-flex;padding:.1rem .4rem;border-radius:4px;font-size:.68rem;font-family:var(--font-mono);background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-tertiary);margin:.1rem}

.controls{display:flex;justify-content:flex-end;gap:.5rem;margin-bottom:1rem}
.ctrl-btn{padding:.35rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:.75rem;cursor:pointer;transition:all .2s var(--transition);font-family:var(--font-sans)}
.ctrl-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-accent)}

.footer{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);text-align:center;color:var(--text-tertiary);font-size:.78rem}

@media(max-width:640px){.container{padding:1rem}.header h1{font-size:1.5rem}.pattern-body{padding:0 1rem 1rem}.legend-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>模式复用映射</h1>
  <p class="subtitle">superpowers 中的通用模式 &rarr; 可复用于领域特定 Skill。四级复用程度，附带具体适配指南。</p>
</header>

<div class="legend">
  <h3>复用等级</h3>
  <div class="legend-grid">
    <div class="legend-item"><span class="legend-dot copy"></span><strong style="color:var(--green)">直接复制</strong> &mdash; 结构性模式，逐字复制到任何纪律执行型 Skill 中</div>
    <div class="legend-item"><span class="legend-dot template"></span><strong style="color:var(--amber)">填充模板</strong> &mdash; 结构固定，填入领域特定内容</div>
    <div class="legend-item"><span class="legend-dot adapt"></span><strong style="color:var(--cyan)">改写适配</strong> &mdash; 核心理念可迁移，但措辞和触发条件需要按领域改写</div>
    <div class="legend-item"><span class="legend-dot inspire"></span><strong style="color:var(--purple)">仅概念参考</strong> &mdash; 原则为设计提供参考，但实现必须从头构建</div>
  </div>
</div>

<div class="search-wrap">
  <span class="search-icon">&#x1F50D;</span>
  <input type="text" class="search-input" id="searchInput" placeholder="按模式、Skill、复用等级或关键词筛选...">
</div>

<div class="filter-bar">
  <span class="filter-label">等级：</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn" data-filter="copy" onclick="setFilter('copy',this)">直接复制</button>
  <button class="filter-btn" data-filter="template" onclick="setFilter('template',this)">填充模板</button>
  <button class="filter-btn" data-filter="adapt" onclick="setFilter('adapt',this)">改写适配</button>
  <button class="filter-btn" data-filter="inspire" onclick="setFilter('inspire',this)">仅概念参考</button>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="toggleAll(true)">全部展开</button>
  <button class="ctrl-btn" onclick="toggleAll(false)">全部折叠</button>
</div>

<main id="patterns"></main>

<footer class="footer">提取自 superpowers/skills/ 源码 &mdash; Skill 设计参考第 4 部分</footer>

</div>

<script>
const patterns = [
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 1. Iron Law — Direct Copy
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id:"iron-law",num:"01",name:"Iron Law",nameCN:"铁律声明",reuse:"copy",
  sourceSkills:["test-driven-development","systematic-debugging","verification-before-completion","writing-skills"],
  summary:"任何纪律执行型 Skill 的绝对行为锚点。结构 100% 可复用，只需替换规则内容。",
  instruction:"<strong>直接复制结构</strong>，替换三部分：(1) ALL CAPS 规则陈述 (2) 违反后果 (3) \"No exceptions\" 下的具体禁止项。禁止项必须从基线测试中收集，不是猜测。",
  adaptation:null,
  businessExample: {
    title: "安全审查 Skill — Iron Law",
    source: "改编自：test-driven-development Iron Law",
    code: `<span class="hl">NO DEPLOYMENT WITHOUT SECURITY REVIEW FIRST</span>

Deploy before security review? Roll back. Start review.

<span class="hl">No exceptions:</span>
- Don't deploy to staging as "pre-check"
- Don't "review while deploying"
- Don't skip for "hotfix urgency"
- Roll back means full revert`
  },
  reuseCases: [
    {domain:"API Design",example:"NO ENDPOINT WITHOUT INPUT VALIDATION FIRST"},
    {domain:"Data Pipeline",example:"NO SCHEMA CHANGE WITHOUT MIGRATION PLAN FIRST"},
    {domain:"DevOps",example:"NO INFRASTRUCTURE CHANGE WITHOUT ROLLBACK PLAN FIRST"},
    {domain:"Documentation",example:"NO PUBLIC API CHANGE WITHOUT DOCS UPDATE FIRST"}
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 2. Anti-Rationalization Table — Fill Template
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id:"anti-rat-table",num:"02",name:"Anti-Rationalization Table",nameCN:"反合理化表格",reuse:"template",
  sourceSkills:["test-driven-development","systematic-debugging","verification-before-completion","using-superpowers"],
  summary:"两列表格结构固定（| Excuse | Reality |），内容需要从业务场景的基线测试中收集。",
  instruction:"<strong>复制表格结构</strong>，用以下流程填充内容：(1) 写一个业务压力场景 (2) 让代理在无 Skill 情况下执行 (3) 记录代理原话的合理化借口 (4) 为每个借口写具体、可验证的反驳。Reality 列必须是事实陈述，不是道德判断。",
  adaptation:"| Excuse | Reality | 格式不变。但 Reality 列的内容必须引用业务中可验证的事实（\"上线后回滚过 3 次\"比\"这不好\"更有说服力）。如果业务有量化数据，优先使用数字。",
  businessExample: {
    title: "安全审查 — 合理化表格",
    source: "模板来自：test-driven-development rationalizations",
    code: `| <span class="bad">Excuse</span> | <span class="good">Reality</span> |
|--------|---------|
| "This endpoint is internal-only" | Internal endpoints get exposed. Audit history shows 4 internal APIs became public in Q1. |
| "We'll review in the next sprint" | 73% of deferred reviews were never completed. Backlog review shows 12 outstanding. |
| "The library handles it" | Library defaulted to insecure mode. Our config override was removed in v3.2. |
| "Compliance already signed off" | Compliance checked policy, not implementation. Audit found 3 policy-compliant but vulnerable deployments. |`
  },
  reuseCases: [
    {domain:"API Design",example:"| \"This field is optional\" | Optional fields become required in v2. Migration cost = 3x retrofit. |"},
    {domain:"Data Pipeline",example:"| \"Source schema won't change\" | 6 breaking schema changes in 8 months from this source. |"},
    {domain:"Code Review",example:"| \"Self-review is enough\" | Self-review catches 23% of issues. Peer review catches 67%. |"}
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 3. Red Flags — Fill Template
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id:"red-flags",num:"03",name:"Red Flags",nameCN:"红旗检测",reuse:"template",
  sourceSkills:["test-driven-development","systematic-debugging","verification-before-completion","using-superpowers","subagent-driven-development"],
  summary:"项目符号列表 + 统一收尾语。列表内容需从业务场景收集，收尾语结构可复用。",
  instruction:"<strong>复制结构</strong>：(1) \"## Red Flags - STOP and [action]\" 标题 (2) 捕获内部思维的列表项（用引号包裹代理想法）(3) 统一收尾语指向明确动作。列表项必须是代理的<strong>思维内容</strong>（\"I already tested this\"），不是外部行为（\"Don't skip testing\"）。",
  adaptation:"收尾语的动作部分必须替换为业务特定动作。TDD 用 \"Delete code. Start over.\"，安全审查用 \"Revert deploy. Run review.\"。动作必须是具体的、可执行的、不可歧义的。",
  businessExample: {
    title: "数据库迁移 — 红旗检测",
    source: "模板来自：systematic-debugging Red Flags",
    code: `<span class="cmt">## Red Flags - STOP and Revert Migration</span>

- "This migration is backwards-compatible"
- "We can fix data issues after deploy"
- "The test environment has the same data"
- "Rollback is easy, we can always go back"
- "The schema change is minor"
- <span class="hl">"Just this one column, it doesn't affect queries"</span>
- <span class="hl">"I already tested with production data snapshot"</span>

<span class="hl">ALL of these mean: STOP. Revert migration. Run full impact analysis.</span>`
  },
  reuseCases: [
    {domain:"API Versioning",example:"ALL of these mean: STOP. Revert API change. Write migration guide."},
    {domain:"Infrastructure",example:"ALL of these mean: STOP. Roll back. Verify rollback plan works."},
    {domain:"Release Process",example:"ALL of these mean: STOP. Revert release. Run full regression."}
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 4. HARD-GATE — Direct Copy
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id:"hard-gate",num:"04",name:"HARD-GATE",nameCN:"硬门控",reuse:"copy",
  sourceSkills:["brainstorming","using-superpowers"],
  summary:"XML 标签包裹的绝对阻断。结构和说服逻辑 100% 可复用。",
  instruction:"<strong>直接复制结构</strong>：(1) <HARD-GATE> 标签 (2) \"Do NOT [blocked actions] until [gate condition]\" (3) \"This applies to EVERY [scope] regardless of [common excuse]\"。关键是 scope 必须是全称（\"EVERY project\"），不留例外。",
  adaptation:"无需改写。只需替换 [blocked actions]、[gate condition] 和 [scope]。XML 标签格式对 Claude 有特殊的注意力放大效果，保持原样。",
  businessExample: {
    title: "API 变更 Skill — HARD-GATE",
    source: "结构来自：brainstorming HARD-GATE",
    code: `<span class="tag">&lt;HARD-GATE&gt;</span>
Do NOT modify any public API signature, add required fields,
or change response format until you have written the migration
guide AND confirmed backward compatibility with all known consumers.

This applies to EVERY API change regardless of perceived
breakage risk.
<span class="tag">&lt;/HARD-GATE&gt;</span>`
  },
  reuseCases: [
    {domain:"Data Pipeline",example:"Do NOT modify pipeline schema until impact analysis is complete AND downstream consumers are notified."},
    {domain:"Release",example:"Do NOT cut a release until all P0 bugs are verified fixed AND staging smoke test passes."},
    {domain:"Config",example:"Do NOT change default config values until migration path is documented AND backward compatibility is verified."}

  - Are data types correct?
  - Are edge cases handled per spec?
  <span class="cmt">// "Do Not Trust the Report" applies here too</span>

<span class="cmt">Stage 2: <span class="hl">Pipeline Quality Review</span> (only after Stage 1 passes)</span>
  - Is error handling robust?
  - Is performance within SLA?
  - Is retry logic correct?
  - Is monitoring/logging adequate?

<span class="hl">NEVER run Stage 2 before Stage 1 passes.</span>
<span class="hl">If Stage 1 finds issues → fix → re-review Stage 1 → then Stage 2.</span>`
  },
  reuseCases: [
    {domain:"Compliance",example:"Stage 1: Policy compliance. Stage 2: Implementation quality. Never reverse."},
    {domain:"UX",example:"Stage 1: Design spec compliance. Stage 2: Code quality and accessibility. Never reverse."},
    {domain:"API",example:"Stage 1: Contract compliance. Stage 2: Performance and error handling. Never reverse."}
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 14. CSO Description — Direct Copy
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id:"cso-desc",num:"14",name:"CSO Description Pattern",nameCN:"搜索优化描述模式",reuse:"copy",
  sourceSkills:["writing-skills"],
  summary:"\"Use when [symptoms], before [action]\" 的 description 格式。这是让 Skill 被发现的机制，结构完全通用。",
  instruction:"<strong>复制格式</strong>：(1) 以 \"Use when\" 开头 (2) 描述可观察的症状/情况 (3) 加 \"before [action]\" 限定触发时机 (4) 绝不描述工作流程。包含错误消息、同义词、工具名作为搜索关键词。",
  adaptation:null,
  businessExample: {
    title: "业务 Skill 描述示例",
    source: "格式来自：writing-skills CSO guidelines",
    code: `<span class="cmt">// API Versioning Skill:</span>
<span class="good">description: Use when modifying public API signatures,
  adding required fields, or changing response formats,
  before merging changes</span>

<span class="cmt">// Data Migration Skill:</span>
<span class="good">description: Use when changing database schema, adding
  NOT NULL columns, or removing tables, before running
  migration</span>

<span class="cmt">// Compliance Check Skill:</span>
<span class="good">description: Use when handling personal data,
  cross-border data transfer, or processing consent,
  before deploying to production</span>`
  },
  reuseCases: [
    {domain:"Any skill",example:"Use the \"Use when [symptoms], before [action]\" format. Never summarize workflow in description."}
  ]
}
];

// ============================================================
// RENDER
// ============================================================

const container = document.getElementById('patterns');
const searchInput = document.getElementById('searchInput');
let currentFilter = 'all';

const reuseLabels = {copy:'直接复制',template:'填充模板',adapt:'改写适配',inspire:'仅概念参考'};
const reuseClasses = {copy:'copy',template:'template',adapt:'adapt',inspire:'inspire'};

patterns.forEach(p => {
  const card = document.createElement('div');
  card.className = 'pattern-card open';
  card.id = p.id;
  card.dataset.reuse = p.reuse;
  card.dataset.search = `${p.name} ${p.nameCN} ${p.reuse} ${p.sourceSkills.join(' ')} ${p.summary} ${JSON.stringify(p.reuseCases)}`.toLowerCase();

  const instrClass = p.reuse === 'copy' ? '' : p.reuse === 'template' ? 'tmpl' : p.reuse === 'adapt' ? 'adpt' : 'insp';

  card.innerHTML = `
    <div class="pattern-header" onclick="toggleCard(this)">
      <span class="p-num">${p.num}</span>
      <span class="p-name">${p.name} <span style="color:var(--text-tertiary);font-size:.8rem">${p.nameCN}</span></span>
      <span class="reuse-badge ${reuseClasses[p.reuse]}">${reuseLabels[p.reuse]}</span>
      <span class="p-arrow">&#9660;</span>
    </div>
    <div class="pattern-body">
      <div class="a-section">
        <div class="a-text">${p.summary}</div>
      </div>

      <div class="a-section">
        <div class="sec-label accent">来源 Skill</div>
        <div style="display:flex;flex-wrap:wrap;gap:.3rem">
          ${p.sourceSkills.map(s => `<span class="sk">${s}</span>`).join('')}
        </div>
      </div>

      <div class="a-section">
        <div class="sec-label accent">如何复用</div>
        <div class="reuse-instr ${instrClass}">${p.instruction}</div>
        ${p.adaptation ? `<div class="a-text" style="margin-top:.5rem"><strong>适配说明：</strong> ${p.adaptation}</div>` : ''}
      </div>

      <div class="a-section">
        <div class="sec-label">业务示例</div>
        <button class="sub-toggle" onclick="toggleSub(this)">
          <span class="sa">&#9654;</span>
          ${p.businessExample.title}
        </button>
        <div class="sub-content">
          <div class="code-block">${p.businessExample.code}</div>
          <div class="code-src"><span class="fr">${p.businessExample.source}</span></div>
        </div>
      </div>

      <div class="a-section">
        <div class="sec-label">更多复用场景 (${p.reuseCases.length})</div>
        <table class="map-table">
          <tr><th>领域</th><th>应用示例</th></tr>
          ${p.reuseCases.map(c => `<tr><td style="color:var(--accent-1);font-weight:500;white-space:nowrap">${c.domain}</td><td>${c.example}</td></tr>`).join('')}
        </table>
      </div>
    </div>
  `;
  container.appendChild(card);
});

function toggleCard(h) { h.parentElement.classList.toggle('open'); }
function toggleSub(b) { b.classList.toggle('open'); }
function toggleAll(open) { document.querySelectorAll('.pattern-card').forEach(c => open ? c.classList.add('open') : c.classList.remove('open')); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  btn.classList.add('active');
  if (f !== 'all') btn.classList.add('active-' + f);

  document.querySelectorAll('.pattern-card').forEach(card => {
    if (f === 'all' || card.dataset.reuse === f) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.pattern-card').forEach(card => {
    if (!q || card.dataset.search.includes(q)) {
      if (currentFilter === 'all' || card.dataset.reuse === currentFilter) {
        card.classList.remove('hidden');
      }
    } else {
      card.classList.add('hidden');
    }
  });
});
</script>
</body>
</html>
