<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic SDLC — 技能调用链</title>
<style>
:root {
  --bg:#08080c;--surface:rgba(255,255,255,0.03);--surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.06);--border-accent:rgba(255,255,255,0.12);
  --text:#ededef;--text-secondary:rgba(255,255,255,0.55);--text-tertiary:rgba(255,255,255,0.3);
  --accent-1:#f59e0b;--accent-2:#ef4444;--accent-3:#34d399;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--cyan:#06b6d4;--purple:#a855f7;
  --font-mono:'SF Mono','Fira Code','JetBrains Mono',monospace;
  --font-sans:-apple-system,'Inter',system-ui,sans-serif;
  --radius:12px;--transition:cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(245,158,11,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(52,211,153,0.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

.header{text-align:center;padding:3rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem}
.header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent-1),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.02em;margin-bottom:.75rem}
.header .subtitle{color:var(--text-secondary);font-size:.95rem;max-width:640px;margin:0 auto}

/* Legend */
.legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:2rem;backdrop-filter:blur(12px);display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:center}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--text-secondary)}
.legend-line{width:24px;height:3px;border-radius:2px}
.legend-line.primary{background:var(--accent-1)}
.legend-line.required{background:var(--red)}
.legend-line.uses{background:var(--cyan);opacity:.5}
.legend-line.optional{background:var(--text-tertiary);opacity:.4}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* Main flow diagram */
.flow-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.5rem;margin-bottom:2rem;backdrop-filter:blur(12px);overflow-x:auto}
.flow-svg{width:100%;min-width:800px;height:auto;display:block}

/* Node detail panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;backdrop-filter:blur(12px);overflow:hidden;transition:border-color .3s var(--transition)}
.detail-panel:hover{border-color:var(--border-accent)}
.detail-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.detail-header:hover{background:var(--surface-hover)}
.detail-name{font-size:.95rem;font-weight:600;flex:1}
.detail-arrow{font-size:.75rem;color:var(--text-tertiary);transition:transform .3s var(--transition)}
.detail-panel.open .detail-arrow{transform:rotate(180deg)}
.detail-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)}
.detail-panel.open .detail-body{display:block}

.badge{display:inline-flex;padding:.15rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;border:1px solid;flex-shrink:0}
.badge.phase{background:rgba(245,158,11,0.1);color:var(--amber);border-color:rgba(245,158,11,0.2)}
.badge.infra{background:rgba(6,182,212,0.1);color:var(--cyan);border-color:rgba(6,182,212,0.2)}
.badge.discipline{background:rgba(239,68,68,0.1);color:var(--red);border-color:rgba(239,68,68,0.2)}
.badge.quality{background:rgba(52,211,153,0.1);color:var(--green);border-color:rgba(52,211,153,0.2)}
.badge.meta{background:rgba(168,85,247,0.1);color:var(--purple);border-color:rgba(168,85,247,0.2)}

/* Detail content */
.d-section{margin-top:1rem}
.d-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:.35rem;font-weight:600}
.d-text{font-size:.83rem;color:var(--text-secondary);line-height:1.7}
.d-text strong{color:var(--text);font-weight:600}
.d-text code{font-family:var(--font-mono);font-size:.76rem;background:rgba(255,255,255,0.06);padding:.1em .3em;border-radius:3px;color:var(--cyan)}
.conn-list{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.conn-tag{display:inline-flex;padding:.12rem .4rem;border-radius:4px;font-size:.68rem;font-family:var(--font-mono);border:1px solid var(--border);color:var(--text-tertiary)}
.conn-tag.calls{border-color:rgba(239,68,68,0.2);color:var(--red)}
.conn-tag.called-by{border-color:rgba(6,182,212,0.2);color:var(--cyan)}
.conn-tag.injects{border-color:rgba(168,85,247,0.2);color:var(--purple)}
.conn-tag.parallel{border-color:rgba(245,158,11,0.2);color:var(--amber)}

/* Code block */
.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-family:var(--font-mono);font-size:.74rem;line-height:1.55;color:var(--text-secondary);margin-top:.5rem;white-space:pre-wrap;word-break:break-word}
.code-block .kw{color:#c678dd}.code-block .fn{color:#61afef}.code-block .str{color:#98c379}.code-block .hl{background:rgba(245,158,11,0.1);display:inline;padding:.1em .2em;border-radius:3px}

/* Sub-toggle */
.sub-toggle{display:flex;align-items:center;gap:.5rem;padding:.45rem 0;cursor:pointer;user-select:none;border:none;background:none;color:var(--text);font-size:.82rem;font-weight:500;width:100%;text-align:left;border-bottom:1px solid var(--border)}
.sub-toggle:hover{color:var(--accent-1)}
.sub-toggle .sa{font-size:.6rem;color:var(--text-tertiary);transition:transform .3s var(--transition)}
.sub-toggle.open .sa{transform:rotate(90deg)}
.sub-content{display:none;padding:.65rem 0}
.sub-toggle.open+.sub-content{display:block}

.controls{display:flex;justify-content:flex-end;gap:.5rem;margin-bottom:1rem}
.ctrl-btn{padding:.35rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:.75rem;cursor:pointer;transition:all .2s var(--transition);font-family:var(--font-sans)}
.ctrl-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-accent)}

.search-wrap{position:relative;margin-bottom:1.5rem}
.search-input{width:100%;padding:.65rem 1rem .65rem 2.25rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-family:var(--font-sans);outline:none;transition:border-color .2s var(--transition);backdrop-filter:blur(8px)}
.search-input:focus{border-color:var(--accent-1)}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:.8rem;pointer-events:none}

.footer{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);text-align:center;color:var(--text-tertiary);font-size:.78rem}

@media(max-width:640px){
  .container{padding:1rem}
  .header h1{font-size:1.5rem}
  .detail-body{padding:0 1rem 1rem}
  .legend{flex-direction:column;align-items:flex-start}
}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>Agentic SDLC &mdash; 技能调用链</h1>
  <p class="subtitle">从会话钩子到分支完成的完整技能调用图。14 个节点，22 条边，一条确定性流水线。</p>
</header>

<div class="legend">
  <div class="legend-item"><span class="legend-line primary"></span> 主流程</div>
  <div class="legend-item"><span class="legend-line required"></span> 必需子技能</div>
  <div class="legend-item"><span class="legend-line uses"></span> 子代理使用</div>
  <div class="legend-item"><span class="legend-line optional"></span> 条件 / 可选</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span> 阶段</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--cyan)"></span> 基础设施</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span> 纪律</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span> 质量</div>
</div>

<!-- ─── SVG Flow Diagram ─── -->
<div class="flow-container">
<svg class="flow-svg" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="var(--accent-1)"/>
    <stop offset="100%" stop-color="var(--accent-3)"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="var(--accent-1)" opacity="0.8"/>
  </marker>
  <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="var(--red)" opacity="0.7"/>
  </marker>
  <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="var(--cyan)" opacity="0.5"/>
  </marker>
  <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="var(--green)" opacity="0.7"/>
  </marker>
</defs>

<!-- ── Phase labels ── -->
<text x="20" y="52" fill="var(--text-tertiary)" font-size="11" font-family="var(--font-mono)" letter-spacing="0.08em">会话初始化</text>
<text x="20" y="162" fill="var(--text-tertiary)" font-size="11" font-family="var(--font-mono)" letter-spacing="0.08em">设计</text>
<text x="20" y="302" fill="var(--text-tertiary)" font-size="11" font-family="var(--font-mono)" letter-spacing="0.08em">计划</text>
<text x="20" y="462" fill="var(--text-tertiary)" font-size="11" font-family="var(--font-mono)" letter-spacing="0.08em">执行</text>
<text x="20" y="642" fill="var(--text-tertiary)" font-size="11" font-family="var(--font-mono)" letter-spacing="0.08em">完成</text>

<!-- Phase separator lines -->
<line x1="15" y1="100" x2="945" y2="100" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="15" y1="240" x2="945" y2="240" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="15" y1="380" x2="945" y2="380" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="15" y1="560" x2="945" y2="560" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>

<!-- ── Nodes ── -->

<!-- 1. session-start hook -->
<rect x="140" y="30" width="180" height="50" rx="8" fill="rgba(168,85,247,0.08)" stroke="var(--purple)" stroke-width="1.5"/>
<text x="230" y="52" text-anchor="middle" fill="var(--purple)" font-size="13" font-weight="600">session-start hook</text>
<text x="230" y="68" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">hooks/session-start</text>

<!-- 2. using-superpowers -->
<rect x="400" y="30" width="190" height="50" rx="8" fill="rgba(168,85,247,0.08)" stroke="var(--purple)" stroke-width="1.5"/>
<text x="495" y="52" text-anchor="middle" fill="var(--purple)" font-size="13" font-weight="600">using-superpowers</text>
<text x="495" y="68" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">引导程序 / 路由器</text>

<!-- 3. using-git-worktrees -->
<rect x="680" y="30" width="190" height="50" rx="8" fill="rgba(6,182,212,0.08)" stroke="var(--cyan)" stroke-width="1.5"/>
<text x="775" y="52" text-anchor="middle" fill="var(--cyan)" font-size="13" font-weight="600">using-git-worktrees</text>
<text x="775" y="68" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">基础设施</text>

<!-- 4. brainstorming -->
<rect x="140" y="120" width="180" height="50" rx="8" fill="rgba(245,158,11,0.08)" stroke="var(--amber)" stroke-width="1.5"/>
<text x="230" y="142" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">brainstorming</text>
<text x="230" y="158" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">流程门控</text>

<!-- 5. writing-plans -->
<rect x="400" y="120" width="190" height="50" rx="8" fill="rgba(245,158,11,0.08)" stroke="var(--amber)" stroke-width="1.5"/>
<text x="495" y="142" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">writing-plans</text>
<text x="495" y="158" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">计划创建</text>

<!-- 6. subagent-driven-dev -->
<rect x="140" y="260" width="200" height="50" rx="8" fill="rgba(245,158,11,0.08)" stroke="var(--amber)" stroke-width="2"/>
<text x="240" y="282" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">subagent-driven-dev</text>
<text x="240" y="298" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">执行引擎（推荐）</text>

<!-- 7. executing-plans -->
<rect x="400" y="260" width="190" height="50" rx="8" fill="rgba(245,158,11,0.08)" stroke="var(--amber)" stroke-width="1.5"/>
<text x="495" y="282" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">executing-plans</text>
<text x="495" y="298" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">内联执行</text>

<!-- 8. TDD -->
<rect x="140" y="390" width="180" height="50" rx="8" fill="rgba(239,68,68,0.08)" stroke="var(--red)" stroke-width="1.5"/>
<text x="230" y="412" text-anchor="middle" fill="var(--red)" font-size="13" font-weight="600">test-driven-dev</text>
<text x="230" y="428" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">纪律</text>

<!-- 9. systematic-debugging -->
<rect x="370" y="390" width="190" height="50" rx="8" fill="rgba(239,68,68,0.08)" stroke="var(--red)" stroke-width="1.5"/>
<text x="465" y="412" text-anchor="middle" fill="var(--red)" font-size="13" font-weight="600">systematic-debugging</text>
<text x="465" y="428" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">纪律</text>

<!-- 10. verification-before-completion -->
<rect x="610" y="390" width="210" height="50" rx="8" fill="rgba(52,211,153,0.08)" stroke="var(--green)" stroke-width="1.5"/>
<text x="715" y="412" text-anchor="middle" fill="var(--green)" font-size="13" font-weight="600">verification-before-completion</text>
<text x="715" y="428" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">质量门控</text>

<!-- 11. requesting-code-review -->
<rect x="855" y="390" width="80" height="50" rx="8" fill="rgba(52,211,153,0.08)" stroke="var(--green)" stroke-width="1"/>
<text x="895" y="412" text-anchor="middle" fill="var(--green)" font-size="11" font-weight="600">code-review</text>
<text x="895" y="428" text-anchor="middle" fill="var(--text-tertiary)" font-size="9">请求审查</text>

<!-- 12. receiving-code-review -->
<rect x="140" y="470" width="190" height="50" rx="8" fill="rgba(52,211,153,0.08)" stroke="var(--green)" stroke-width="1"/>
<text x="235" y="492" text-anchor="middle" fill="var(--green)" font-size="13" font-weight="600">receiving-code-review</text>
<text x="235" y="508" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">质量 / 反馈</text>

<!-- 13. finishing-a-development-branch -->
<rect x="370" y="580" width="220" height="50" rx="8" fill="rgba(245,158,11,0.08)" stroke="var(--amber)" stroke-width="1.5"/>
<text x="480" y="602" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">finishing-a-dev-branch</text>
<text x="480" y="618" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">合并 / PR / 清理</text>

<!-- 14. writing-skills (meta, outside main flow) -->
<rect x="700" y="120" width="170" height="50" rx="8" fill="rgba(168,85,247,0.06)" stroke="var(--purple)" stroke-width="1" stroke-dasharray="4,3"/>
<text x="785" y="142" text-anchor="middle" fill="var(--purple)" font-size="12" font-weight="600" opacity="0.7">writing-skills</text>
<text x="785" y="158" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">元技能（非主流程）</text>

<!-- ── Primary flow arrows ── -->
<!-- hook → using-superpowers -->
<line x1="320" y1="55" x2="398" y2="55" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="360" y="48" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">注入</text>

<!-- using-superpowers → brainstorming -->
<path d="M400,80 L280,80 L280,118" fill="none" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="340" y="74" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">路由</text>

<!-- brainstorming → writing-plans -->
<line x1="320" y1="145" x2="398" y2="145" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="360" y="138" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">终态 → 调用</text>

<!-- writing-plans → subagent-driven -->
<path d="M445,170 L445,210 L240,210 L240,258" fill="none" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="370" y="204" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">必需（推荐）</text>

<!-- writing-plans → executing-plans -->
<path d="M545,170 L545,210 L495,210 L495,258" fill="none" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="545" y="204" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">必需（备选）</text>

<!-- subagent-driven → finishing -->
<path d="M340,310 L340,340 L480,340 L480,578" fill="none" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>
<text x="440" y="334" text-anchor="middle" fill="var(--accent-1)" font-size="9" font-family="var(--font-mono)">所有任务完成后</text>

<!-- executing-plans → finishing -->
<path d="M495,310 L495,340 L520,340 L520,578" fill="none" stroke="var(--accent-1)" stroke-width="2" marker-end="url(#arrowP)"/>

<!-- ── REQUIRED sub-skill arrows (red) ── -->
<!-- subagent → worktrees -->
<path d="M340,260 L480,240 L680,80 L678,62" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
<text x="530" y="165" fill="var(--red)" font-size="9" font-family="var(--font-mono)" opacity="0.7">必需</text>

<!-- executing → worktrees -->
<path d="M590,275 L680,115 L678,82" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>

<!-- ── Sub-agent usage arrows (cyan) ── -->
<!-- subagent → TDD (subagent uses) -->
<line x1="240" y1="310" x2="230" y2="388" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowC)"/>
<text x="215" y="350" fill="var(--cyan)" font-size="9" font-family="var(--font-mono)" opacity="0.7">子代理使用</text>

<!-- subagent → requesting-code-review -->
<line x1="340" y1="300" x2="870" y2="398" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowC)"/>

<!-- subagent → verification -->
<line x1="340" y1="310" x2="700" y2="398" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowC)"/>

<!-- executing → TDD -->
<line x1="460" y1="310" x2="280" y2="388" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowC)"/>

<!-- ── Conditional arrows (dotted gray) ── -->
<!-- TDD → systematic-debugging (when bug found) -->
<line x1="320" y1="415" x2="368" y2="415" stroke="var(--text-tertiary)" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowC)"/>

const container = document.getElementById('detailCards');
const searchInput = document.getElementById('searchInput');

nodes.forEach(n => {
  const card = document.createElement('div');
  card.className = 'detail-panel';
  card.id = 'card-' + n.id;
  card.dataset.search = `${n.name} ${n.nameCN} ${n.type} ${n.phase} ${n.role} ${n.calls.map(c=>c.name).join(' ')} ${n.calledBy.map(c=>c.name).join(' ')}`.toLowerCase();

  card.innerHTML = `
    <div class="detail-header" onclick="toggleCard(this)">
      <span class="badge ${n.badge}">${n.badgeLabel}</span>
      <span class="detail-name">${n.name} <span style="color:var(--text-tertiary);font-size:.8rem">${n.nameCN}</span></span>
      <span style="color:var(--text-tertiary);font-size:.72rem;white-space:nowrap">${n.phase}</span>
      <span class="detail-arrow">&#9660;</span>
    </div>
    <div class="detail-body">
      <div class="d-section">
        <div class="d-label">角色</div>
        <div class="d-text">${n.role}</div>
      </div>

      ${n.calls.length ? `
      <div class="d-section">
        <div class="d-label">调用 / 路由到 (${n.calls.length})</div>
        <div class="conn-list">
          ${n.calls.map(c => `<span class="conn-tag ${c.type === 'REQUIRED' || c.type === 'terminal' ? 'calls' : c.type === 'injects' ? 'injects' : c.type === 'subagent uses' ? 'parallel' : 'called-by'}">${c.name} <span style="opacity:.6">${c.type}</span></span>`).join('')}
        </div>
        ${n.calls.some(c=>c.note) ? `<div class="d-text" style="margin-top:.35rem;font-size:.78rem;color:var(--text-tertiary)">${n.calls.filter(c=>c.note).map(c=>`<strong>${c.name}</strong>: ${c.note}`).join(' &bull; ')}</div>` : ''}
      </div>` : ''}

      ${n.calledBy.length ? `
      <div class="d-section">
        <div class="d-label">被调用 (${n.calledBy.length})</div>
        <div class="conn-list">
          ${n.calledBy.map(c => `<span class="conn-tag called-by">${c.name} <span style="opacity:.6">${c.type}</span></span>`).join('')}
        </div>
      </div>` : ''}

      <div class="d-section">
        <div class="d-label">关键源码</div>
        <button class="sub-toggle" onclick="toggleSub(this)">
          <span class="sa">&#9654;</span> 显示源码摘录
        </button>
        <div class="sub-content">
          <div class="code-block">${n.keySource}</div>
        </div>
      </div>
    </div>
  `;
  container.appendChild(card);
});

function toggleCard(h) { h.parentElement.classList.toggle('open'); }
function toggleSub(b) { b.classList.toggle('open'); }
function toggleAll(open) { document.querySelectorAll('.detail-panel').forEach(c => open ? c.classList.add('open') : c.classList.remove('open')); }

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.detail-panel').forEach(card => {
    card.style.display = (!q || card.dataset.search.includes(q)) ? '' : 'none';
  });
});
</script>
