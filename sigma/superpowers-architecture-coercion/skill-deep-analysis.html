<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superpowers 核心技能深度分析</title>
<style>
:root {
  --bg: #08080c;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(255,255,255,0.12);
  --text: #ededef;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent-1: #f59e0b;
  --accent-2: #ef4444;
  --accent-3: #34d399;
  --accent-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --cyan: #06b6d4;
  --purple: #a855f7;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  --font-sans: -apple-system, 'Inter', system-ui, sans-serif;
  --radius: 12px;
  --transition: cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}
body::before {
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 0%, rgba(245,158,11,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(239,68,68,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.03) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
.container { max-width:920px; margin:0 auto; padding:2rem 1.5rem 4rem; position:relative; z-index:1; }

/* Header */
.header { text-align:center; padding:3rem 0 2.5rem; border-bottom:1px solid var(--border); margin-bottom:2.5rem; }
.header h1 { font-size:2rem; font-weight:700; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.02em; margin-bottom:0.75rem; }
.header .subtitle { color:var(--text-secondary); font-size:0.95rem; max-width:640px; margin:0 auto; }
.chips { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin-top:1.25rem; }
.chip { display:inline-flex; align-items:center; gap:0.35rem; padding:0.3rem 0.75rem; border-radius:999px; font-size:0.75rem; font-weight:500; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary); backdrop-filter:blur(8px); }
.chip .dot { width:6px; height:6px; border-radius:50%; }
.chip .dot.amber { background:var(--amber); }
.chip .dot.red { background:var(--red); }
.chip .dot.green { background:var(--green); }
.chip .dot.cyan { background:var(--cyan); }

/* TOC */
.toc { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:2.5rem; backdrop-filter:blur(12px); }
.toc h2 { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-tertiary); margin-bottom:1rem; }
.toc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:0.4rem; }
.toc-link { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0.75rem; border-radius:8px; color:var(--text-secondary); text-decoration:none; font-size:0.85rem; transition:all 0.2s var(--transition); cursor:pointer; }
.toc-link:hover { background:var(--surface-hover); color:var(--text); }
.toc-link .toc-num { font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-1); min-width:1.8rem; }

/* Search */
.search-wrap { position:relative; margin-bottom:2rem; }
.search-input { width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:0.85rem; font-family:var(--font-sans); outline:none; transition:border-color 0.2s var(--transition); backdrop-filter:blur(8px); }
.search-input:focus { border-color:var(--accent-1); }
.search-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:var(--text-tertiary); font-size:0.85rem; pointer-events:none; }

/* Controls */
.controls { display:flex; justify-content:flex-end; gap:0.5rem; margin-bottom:1rem; }
.ctrl-btn { padding:0.35rem 0.75rem; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary); font-size:0.75rem; cursor:pointer; transition:all 0.2s var(--transition); font-family:var(--font-sans); }
.ctrl-btn:hover { background:var(--surface-hover); color:var(--text); border-color:var(--border-accent); }

/* Skill Card */
.skill-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:2rem; backdrop-filter:blur(12px); overflow:hidden; transition:border-color 0.3s var(--transition); }
.skill-card:hover { border-color:var(--border-accent); }
.skill-card.hidden { display:none; }

.skill-header { display:flex; align-items:flex-start; justify-content:space-between; padding:1.25rem 1.5rem; cursor:pointer; user-select:none; gap:1rem; }
.skill-header:hover { background:var(--surface-hover); }
.skill-title-row { display:flex; align-items:center; gap:0.75rem; flex:1; min-width:0; }
.skill-num { font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-1); flex-shrink:0; }
.skill-name { font-size:1.1rem; font-weight:600; color:var(--text); }
.skill-badges { display:flex; flex-wrap:wrap; gap:0.35rem; flex-shrink:0; }
.skill-arrow { font-size:0.9rem; color:var(--text-tertiary); transition:transform 0.3s var(--transition); flex-shrink:0; margin-top:0.15rem; }
.skill-card.open .skill-arrow { transform:rotate(180deg); }

.skill-body { display:none; padding:0 1.5rem 1.5rem; border-top:1px solid var(--border); }
.skill-card.open .skill-body { display:block; }

/* Layer & principle badges */
.badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.55rem; border-radius:5px; font-size:0.68rem; font-weight:600; letter-spacing:0.02em; }
.badge.l0 { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
.badge.l1 { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
.badge.l2 { background:rgba(6,182,212,0.12); color:#06b6d4; border:1px solid rgba(6,182,212,0.2); }
.badge.l3 { background:rgba(52,211,153,0.12); color:#34d399; border:1px solid rgba(52,211,153,0.2); }
.badge.l4 { background:rgba(168,85,247,0.12); color:#a855f7; border:1px solid rgba(168,85,247,0.2); }
.badge.principle { background:rgba(245,158,11,0.08); color:var(--accent-1); border:1px solid rgba(245,158,11,0.15); }
.badge.avoid { background:rgba(239,68,68,0.06); color:var(--red); border:1px solid rgba(239,68,68,0.12); opacity:0.7; }
.badge.pattern { background:rgba(52,211,153,0.08); color:var(--green); border:1px solid rgba(52,211,153,0.15); }

/* Analysis sections */
.analysis-section { margin-top:1.5rem; }
.section-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-tertiary); margin-bottom:0.5rem; font-weight:600; display:flex; align-items:center; gap:0.5rem; }
.section-label.accent { color:var(--accent-1); }
.section-label .sec-icon { font-size:0.85rem; }

.analysis-text { color:var(--text-secondary); font-size:0.88rem; line-height:1.85; }
.analysis-text strong { color:var(--text); font-weight:600; }
.analysis-text em { color:var(--accent-1); font-style:normal; font-weight:500; }

/* Sub-collapsible */
.sub-toggle { display:flex; align-items:center; gap:0.5rem; padding:0.55rem 0; cursor:pointer; user-select:none; border:none; background:none; color:var(--text); font-size:0.85rem; font-weight:500; width:100%; text-align:left; border-bottom:1px solid var(--border); transition:color 0.2s var(--transition); }
.sub-toggle:hover { color:var(--accent-1); }
.sub-toggle .sub-arrow { font-size:0.65rem; color:var(--text-tertiary); transition:transform 0.3s var(--transition); }
.sub-toggle.open .sub-arrow { transform:rotate(90deg); }
.sub-content { display:none; padding:0.75rem 0; }
.sub-toggle.open + .sub-content { display:block; }

/* Code blocks */
.code-block { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; padding:1rem 1.25rem; overflow-x:auto; font-family:var(--font-mono); font-size:0.78rem; line-height:1.6; color:var(--text-secondary); margin-top:0.75rem; white-space:pre-wrap; word-break:break-word; }
.code-block .kw { color:#c678dd; }
.code-block .fn { color:#61afef; }
.code-block .str { color:#98c379; }
.code-block .num { color:#d19a66; }
.code-block .cmt { color:rgba(255,255,255,0.25); font-style:italic; }
.code-block .tag { color:#e06c75; }
.code-block .hl { background:rgba(245,158,11,0.1); display:inline; padding:0.1em 0.2em; border-radius:3px; }

.code-source { display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem; font-size:0.72rem; color:var(--text-tertiary); font-family:var(--font-mono); }
.code-source .file-ref { color:var(--cyan); }

/* Table */
.a-table { width:100%; border-collapse:collapse; font-size:0.8rem; margin-top:0.5rem; }
.a-table th { text-align:left; padding:0.45rem 0.7rem; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-tertiary); border-bottom:1px solid var(--border); font-weight:600; }
.a-table td { padding:0.45rem 0.7rem; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-secondary); vertical-align:top; }
.a-table tr:last-child td { border-bottom:none; }

/* Tags */
.tag-row { display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:0.4rem; }

/* Decision callout */
.decision-callout { background:rgba(245,158,11,0.05); border-left:3px solid var(--accent-1); padding:0.75rem 1rem; border-radius:0 8px 8px 0; margin:0.75rem 0; font-size:0.85rem; color:var(--text-secondary); }
.decision-callout strong { color:var(--accent-1); }

/* Footer */
.footer { margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border); text-align:center; color:var(--text-tertiary); font-size:0.78rem; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }

@media (max-width:640px) {
  .container { padding:1rem; }
  .header h1 { font-size:1.5rem; }
  .skill-header { padding:1rem; flex-direction:column; }
  .skill-body { padding:0 1rem 1rem; }
  .toc-grid { grid-template-columns:1fr; }
}
</style>
</head>

  principlesUsed: ["Authority","Social Proof"],
  principlesAvoided: [],
  designGoal: "消除代理在声称工作完成时的\"虚假完成\"问题。核心洞察：代理倾向于表达满意（\"Great!\"、\"Done!\"、\"Perfect!\"）而不是运行实际验证。这不是代理在\"撒谎\" — 而是默认行为模式中缺乏\"先验证再声称\"的约束。",
  keyDecisions: [
    { q: "为什么 'evidence before claims, always'?", a: "这是核心行为翻转：将默认流程从 \"claim → maybe verify\" 翻转为 \"verify → then claim\"。'always' 消除了 'just this once' 的合理化。'evidence before claims' 的措辞比 'verify before completing' 更精确 — 它强调的是声明和证据的时序关系。" },
    { q: "为什么 Gate Function 有 5 步而不是 3 步?", a: "5 步（IDENTIFY → RUN → READ → VERIFY → ONLY THEN）中的每一步封堵一个特定的合理化路径：IDENTIFY 防止 'wrong command'；RUN 防止 'I'll run it later'；READ 防止 'ran it but didn't check output'；VERIFY 防止 'checked but it failed'；ONLY THEN 防止 'verified but claimed before verifying'。" },
    { q: "为什么说 'Skip any step = lying, not verifying'?", a: "使用强烈的道德语言（'lying'）而非温和的技术语言（'incomplete'）。这是 Authority 原则的极端形式 — 它将跳过步骤从技术疏忽升级为道德失败，显著提高了遵守率。" },
    { q: "为什么 Common Failures 表格映射 claim→requirement?", a: "表格结构让代理能快速查找：\"我要声称 X，我需要什么证据?\" 每行明确说明了什么是充分证据（\"Test command output: 0 failures\"）什么不是（\"Previous run, 'should pass'\"）。消除了对\"充分验证\"的模糊理解。" }

  flowchart: `<span class="cmt">About to claim completion / express satisfaction?</span>
       ↓
<span class="hl">THE GATE FUNCTION:</span>
  <span class="num">1.</span> IDENTIFY: What command proves this claim?
  <span class="num">2.</span> RUN: Execute the FULL command (fresh, complete)
  <span class="num">3.</span> READ: Full output, check exit code, count failures
  <span class="num">4.</span> VERIFY: Does output confirm the claim?
       ↓no: State actual status with evidence
       ↓yes:
  <span class="num">5.</span> ONLY THEN: Make the claim
       ↓
<span class="hl">Skip any step = lying, not verifying</span>`,
  flowchartCN: `<span class="cmt">即将声称完成 / 表达满意？</span>
       ↓
<span class="hl">门控函数：</span>

  <span class="num">2.</span> 运行：执行完整的命令（全新、完整）

<span class="hl">跳过任何一步 = 撒谎，不是验证</span>`,

  persuasionAnalysis: "<strong>Authority</strong> 是绝对主导：Iron Law + Gate Function + \"Skip any step = lying\" 三层递进的权威语言。\"Claiming work is complete without verification is dishonesty, not efficiency\" — 将技术行为框架为道德问题。<strong>Social Proof</strong> 出现在 \"Why This Matters\" 段落中的 24 个失败记忆 — 通过列举具体的失败案例建立\"这是普遍问题\"的认知。值得注意的是这个 Skill 不使用 <strong>Commitment</strong> — 因为它不是流程型 Skill，而是\"时刻警醒型\" Skill。它不需要 TodoWrite checklist，而是需要在每个声明性动作前触发 Gate Function。",
  defenseAnalysis: "<span class='badge l1'>L1 锁定</span>：Iron Law + spirit-over-letter 声明<br><span class='badge l2'>L2 反合理化</span>：8 项 Rationalization Prevention + 9 项 Red Flags<br><span class='badge l3'>L3 顺序门控</span>：Gate Function 的 5 步严格顺序<br><span class='badge l4'>L4 证据验证</span>：整个 Skill 就是 L4 的实现 — 要求在声称前必须运行命令并读取输出",
  reusablePatterns: ["Iron Law","Gate Function","Anti-Rationalization Table","Red Flags","When/Then Trigger"],
  excerpts: [

    { title: "Common Failures Mapping", titleCN: "常见失败映射", source: "skills/verification-before-completion/SKILL.md:42-50", code: `| <span class="bad">Claim</span>           | <span class="good">Requires</span>                          | <span class="bad">Not Sufficient</span>              |

{
  id: "test-driven-development",
  num: "07",
  name: "test-driven-development",
  nameCN: "测试驱动开发",
  type: "纪律执行型",
  layers: ["l1","l2","l3","l4"],
  principlesUsed: ["Authority","Social Proof","Commitment"],
  principlesAvoided: ["Liking"],
  designGoal: "强制执行严格的 RED-GREEN-REFACTOR 循环。核心问题：代理（和人类开发者一样）在压力下会跳过测试先写代码，然后用\"测试后也能达到同样效果\"来合理化。这个 Skill 用多层次防御确保测试先于实现。",
  keyDecisions: [
    { q: "为什么 'Delete means delete' 而不是 'refactor to add tests'?", a: "\"Refactor to add tests\" 本质上就是 tests-after。一旦代码存在，代理会不自觉地\"参考\"它来写测试，导致测试验证的是实现而非需求。Delete 消除了这条路径。这是一个经过基线测试验证的结论 — 保留代码的代理总是最终写出 tests-after 的测试。" },
    { q: "为什么 'Verify RED' 和 'Verify GREEN' 是独立步骤?", a: "\"Write failing test\" 不等于 \"wrote a test that fails for the right reason\"。测试可能因为 typo 失败（不是 feature missing），或者可能已经通过（测试的是现有行为）。Verify RED 确保测试确实测试了不存在的行为。Verify GREEN 确保代码确实让测试通过且没有破坏其他测试。这两个验证步骤是 TDD 循环正确性的保证。" },
    { q: "为什么反驳 'tests after achieve same goals' 用了认知科学论证?", a: "这个借口有直觉吸引力（\"最终都有测试，有什么区别?\"）。仅用权威语言反驳不够 — 需要解释为什么顺序重要。\"Tests-after answer 'What does this do?' Tests-first answer 'What should this do?'\" — 这个区分直击核心：测试后写 = 验证实现；测试先写 = 定义需求。" },
    { q: "为什么 YAGNI 出现在 GREEN 步骤中?", a: "GREEN 阶段是代理最容易 over-engineer 的时候。\"While I'm at it\" 心理在写通过测试的最小代码时特别强烈。Good/Bad 代码对比明确展示了什么是 minimal（retryOperation 的 3 参数版本 vs 3+ options 版本）。" }
  ],
  flowchart: `<span class="hl">RED:</span> Write failing test
       ↓
<span class="hl">Verify RED:</span> Fails for expected reason? (not typo)
       ↓yes                ↓wrong failure → fix test
<span class="hl">GREEN:</span> Write minimal code to pass
       ↓
<span class="hl">Verify GREEN:</span> All tests pass? Pristine output?
       ↓yes         ↓no → fix code
<span class="hl">REFACTOR:</span> Clean up (keep tests green)
       ↓
<span class="hl">Next</span> failing test`,
  flowchartCN: `<span class="hl">RED：</span> 编写失败测试
       ↓
<span class="hl">验证 RED：</span> 因预期原因失败？（不是拼写错误）
       ↓是                ↓错误原因 → 修复测试
<span class="hl">GREEN：</span> 编写最小代码使测试通过
       ↓
<span class="hl">验证 GREEN：</span> 所有测试通过？输出干净？
       ↓是         ↓否 → 修复代码
<span class="hl">REFACTOR：</span> 清理（保持测试绿色）

const tocGrid = document.getElementById('tocGrid');
const container = document.getElementById('skillsContainer');
const searchInput = document.getElementById('searchInput');

// TOC
skills.forEach(s => {
  const a = document.createElement('a');
  a.className = 'toc-link';
  a.href = '#' + s.id;
  a.dataset.id = s.id;
  a.innerHTML = `<span class="toc-num">${s.num}</span>${s.name} <span style="color:var(--text-tertiary);font-size:0.78rem;">${s.type}</span>`;
  a.onclick = e => { e.preventDefault(); document.getElementById(s.id).scrollIntoView({behavior:'smooth',block:'start'}); };
  tocGrid.appendChild(a);
});

// Skill cards
skills.forEach(s => {
  const layerBadges = s.layers.map(l => `<span class="badge ${l}">${l.toUpperCase()}</span>`).join('');
  const principleBadges = s.principlesUsed.map(p => `<span class="badge principle">${p}</span>`).join('');
  const avoidBadges = s.principlesAvoided.map(p => `<span class="badge avoid">No ${p}</span>`).join('');
  const patternBadges = s.reusablePatterns.map(p => `<span class="badge pattern">${p}</span>`).join('');

  const card = document.createElement('div');
  card.className = 'skill-card';
  card.id = s.id;
  card.dataset.search = `${s.name} ${s.nameCN} ${s.type} ${s.principlesUsed.join(' ')} ${s.reusablePatterns.join(' ')} ${s.designGoal}`.toLowerCase();

  card.innerHTML = `
    <div class="skill-header" onclick="toggleCard(this)">
      <div class="skill-title-row">
        <span class="skill-num">${s.num}</span>
        <span class="skill-name">${s.name}</span>
        <span style="color:var(--text-tertiary);font-size:0.8rem;">${s.nameCN}</span>
        <span style="color:var(--text-tertiary);font-size:0.72rem;opacity:0.6;">${s.type}</span>
      </div>
      <div class="skill-badges">${layerBadges}${principleBadges}${avoidBadges}</div>
      <span class="skill-arrow">&#9660;</span>
    </div>
    <div class="skill-body">

      <!-- 设计目标 -->
      <div class="analysis-section">
        <div class="section-label accent"><span class="sec-icon">&#9670;</span> 设计目标</div>
        <div class="analysis-text">${s.designGoal}</div>
      </div>

      <!-- 核心流程 -->
      <div class="analysis-section">
        <div class="section-label"><span class="sec-icon">&#9656;</span> 核心流程</div>
        <div class="code-block">${s.flowchart}</div>
        ${s.flowchartCN ? `<div style="margin-top:0.5rem;"><div class="section-label" style="margin-bottom:0.3rem;">中文译文</div><div class="code-block" style="background:rgba(245,158,11,0.04);border-color:rgba(245,158,11,0.12);">${s.flowchartCN}</div></div>` : ''}
      </div>

      <!-- 关键设计决策 -->
      <div class="analysis-section">
        <div class="section-label accent"><span class="sec-icon">&#9881;</span> 关键设计决策 (${s.keyDecisions.length})</div>
        ${s.keyDecisions.map((d,i) => `
          <button class="sub-toggle" onclick="toggleSub(this)">
            <span class="sub-arrow">&#9654;</span>
            ${d.q}
          </button>
          <div class="sub-content">
            <div class="decision-callout"><strong>答：</strong> ${d.a}</div>
          </div>
        `).join('')}
      </div>

      <!-- 说服原则分析 -->
      <div class="analysis-section">
        <div class="section-label"><span class="sec-icon">&#9830;</span> 说服原则分析</div>
        <div class="tag-row" style="margin-bottom:0.75rem;">
          ${principleBadges}
          ${avoidBadges}
        </div>
        <div class="analysis-text">${s.persuasionAnalysis}</div>
      </div>

      <!-- 防御层分析 -->
      <div class="analysis-section">
        <div class="section-label accent"><span class="sec-icon">&#9632;</span> 防御层分析</div>
        <div class="analysis-text">${s.defenseAnalysis}</div>
      </div>

      <!-- 可复用设计模式 -->
      <div class="analysis-section">
        <div class="section-label"><span class="sec-icon">&#9733;</span> 可复用设计模式</div>
        <div class="tag-row">${patternBadges}</div>
      </div>

      <!-- 关键源码摘录 -->
      <div class="analysis-section">
        <div class="section-label accent"><span class="sec-icon">&#128196;</span> 关键源码摘录 (${s.excerpts.length})</div>
        ${s.excerpts.map(ex => `
          <button class="sub-toggle" onclick="toggleSub(this)">
            <span class="sub-arrow">&#9654;</span>
            ${ex.titleCN ? ex.titleCN + ' / ' : ''}${ex.title}
          </button>
          <div class="sub-content">
            <div class="code-block">${ex.code}</div>
            <div class="code-source"><span class="file-ref">${ex.source}</span></div>
            ${ex.translation ? `<div style="margin-top:0.75rem;"><div class="section-label" style="margin-bottom:0.3rem;">中文译文</div><div class="code-block" style="background:rgba(245,158,11,0.04);border-color:rgba(245,158,11,0.12);">${ex.translation}</div></div>` : ''}
          </div>
        `).join('')}
      </div>

    </div>
  `;
  container.appendChild(card);
});

function toggleCard(header) { header.parentElement.classList.toggle('open'); }
function toggleSub(btn) { btn.classList.toggle('open'); }
function toggleAll(open) {
  document.querySelectorAll('.skill-card').forEach(c => {
    open ? c.classList.add('open') : c.classList.remove('open');
  });
}

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.skill-card').forEach(card => {
    card.classList.toggle('hidden', q && !card.dataset.search.includes(q));
  });
  document.querySelectorAll('.toc-link').forEach(link => {
    const card = document.getElementById(link.dataset.id);
    link.style.opacity = (card && card.classList.contains('hidden')) ? '0.3' : '1';
  });
});

// 默认展开第一个卡片
document.querySelector('.skill-card').classList.add('open');
</script>
