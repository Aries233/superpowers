<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superpowers Skill 设计模式参考</title>
<style>
:root {
  --bg: #08080c;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(255,255,255,0.12);
  --text: #ededef;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent-1: #f59e0b;
  --accent-2: #ef4444;
  --accent-3: #34d399;
  --accent-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --cyan: #06b6d4;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  --font-sans: -apple-system, 'Inter', system-ui, sans-serif;
  --radius: 12px;
  --transition: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* Mesh gradient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(245,158,11,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(239,68,68,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 3rem 0 2.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2.5rem;
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
}

.header .subtitle {
  color: var(--text-secondary);
  font-size: 0.95rem;
  max-width: 600px;
  margin: 0 auto;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1.25rem;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  backdrop-filter: blur(8px);
}

.chip .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.chip .dot.amber { background: var(--amber); }
.chip .dot.red { background: var(--red); }
.chip .dot.green { background: var(--green); }
.chip .dot.cyan { background: var(--cyan); }

/* Defense Layer Badge */
.layer-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.layer-badge.l0 { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.layer-badge.l1 { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
.layer-badge.l2 { background: rgba(6,182,212,0.12); color: #06b6d4; border: 1px solid rgba(6,182,212,0.2); }
.layer-badge.l3 { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
.layer-badge.l4 { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.2); }
.layer-badge.meta { background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 1px solid var(--border); }
.layer-badge.principle { background: rgba(245,158,11,0.08); color: var(--accent-1); border: 1px solid rgba(245,158,11,0.15); }

/* TOC */
.toc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 2.5rem;
  backdrop-filter: blur(12px);
}

.toc h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 1rem;
}

.toc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 0.4rem;
}

.toc-link {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  transition: all 0.2s var(--transition);
  cursor: pointer;
}

.toc-link:hover {
  background: var(--surface-hover);
  color: var(--text);
}

.toc-link .toc-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent-1);
  min-width: 1.8rem;
}

/* Pattern Card */
.pattern-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  backdrop-filter: blur(12px);
  overflow: hidden;
  transition: border-color 0.3s var(--transition);
}

.pattern-card:hover {
  border-color: var(--border-accent);
}

.pattern-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  user-select: none;
  gap: 1rem;
}

.pattern-header:hover {
  background: var(--surface-hover);
}

.pattern-title-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
  min-width: 0;
}

.pattern-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent-1);
  flex-shrink: 0;
  opacity: 0.7;
}

.pattern-name {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}

.pattern-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  flex-shrink: 0;
}

.pattern-arrow {
  font-size: 0.9rem;
  color: var(--text-tertiary);
  transition: transform 0.3s var(--transition);
  flex-shrink: 0;
  margin-top: 0.15rem;
}

.pattern-card.open .pattern-arrow {
  transform: rotate(180deg);
}

.pattern-body {
  display: none;
  padding: 0 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}

.pattern-card.open .pattern-body {
  display: block;
}

/* Sections within pattern */
.pattern-section {
  margin-top: 1.25rem;
}

.pattern-section:first-child {
  margin-top: 1.25rem;
}

.section-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.section-label.accent { color: var(--accent-1); }

.pattern-def {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.8;
}

.pattern-def strong {
  color: var(--text);
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}

.skill-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-family: var(--font-mono);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.skill-tag.primary {
  background: rgba(245,158,11,0.08);
  border-color: rgba(245,158,11,0.2);
  color: var(--accent-1);
}

/* Code blocks */
.code-block {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-top: 0.75rem;
  white-space: pre-wrap;
  word-break: break-word;
}

.code-block .kw { color: #c678dd; }
.code-block .fn { color: #61afef; }
.code-block .str { color: #98c379; }
.code-block .num { color: #d19a66; }
.code-block .cmt { color: rgba(255,255,255,0.25); font-style: italic; }
.code-block .tag { color: #e06c75; }
.code-block .attr { color: #d19a66; }
.code-block .hl { background: rgba(245,158,11,0.1); display: inline; padding: 0.1em 0.2em; border-radius: 3px; }

.code-source {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
  font-size: 0.72rem;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}

.code-source .file-ref {
  color: var(--cyan);
}

/* Collapsible sub-sections */
.sub-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 0;
  cursor: pointer;
  user-select: none;
  border: none;
  background: none;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 500;
  width: 100%;
  text-align: left;
  border-bottom: 1px solid var(--border);
  transition: color 0.2s var(--transition);
}

.sub-toggle:hover { color: var(--accent-1); }

.sub-toggle .sub-arrow {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  transition: transform 0.3s var(--transition);
}

.sub-toggle.open .sub-arrow {
  transform: rotate(90deg);
}

.sub-content {
  display: none;
  padding: 0.75rem 0;
}

.sub-toggle.open + .sub-content {
  display: block;
}

/* Table */
.pattern-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin-top: 0.5rem;
}

.pattern-table th {
  text-align: left;
  padding: 0.5rem 0.75rem;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}

.pattern-table td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
  vertical-align: top;
}

.pattern-table tr:last-child td {
  border-bottom: none;
}

.pattern-table .good { color: var(--green); }
.pattern-table .bad { color: var(--red); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* Expand All / Collapse All controls */
.controls {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.ctrl-btn {
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s var(--transition);
  font-family: var(--font-sans);
}

.ctrl-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: var(--border-accent);
}

/* Footer */
.footer {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-tertiary);
  font-size: 0.78rem;
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 1rem; }
  .header h1 { font-size: 1.5rem; }
  .pattern-header { padding: 1rem; flex-direction: column; }
  .pattern-badges { margin-top: 0.25rem; }
  .pattern-body { padding: 0 1rem 1rem; }
  .toc-grid { grid-template-columns: 1fr; }
  .chips { gap: 0.35rem; }
}

/* Search */
.search-wrap {
  position: relative;
  margin-bottom: 2rem;
}

.search-input {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.5rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.2s var(--transition);
  backdrop-filter: blur(8px);
}

.search-input:focus { border-color: var(--accent-1); }

.search-icon {
  position: absolute;
  left: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: 0.85rem;
  pointer-events: none;
}

/* Connection line between patterns */
.pattern-card.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>Skill 设计模式</h1>
  <p class="subtitle">Superpowers 架构中反复出现的 11 种设计模式 &mdash; 提取自 14 个 Skill 的源码分析</p>
  <div class="chips">
    <span class="chip"><span class="dot amber"></span>L0 注入 &rarr; L1 锁定</span>
    <span class="chip"><span class="dot red"></span>L2 反合理化</span>
    <span class="chip"><span class="dot green"></span>L3 顺序门控</span>
    <span class="chip"><span class="dot cyan"></span>L4 证据验证</span>
  </div>
</header>

<nav class="toc">
  <h2>模式索引</h2>
  <div class="toc-grid" id="tocGrid"></div>
</nav>

<div class="search-wrap">
  <span class="search-icon">&#x1F50D;</span>
  <input type="text" class="search-input" id="searchInput" placeholder="按名称、Skill 或关键词筛选模式...">
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="toggleAll(true)">全部展开</button>
  <button class="ctrl-btn" onclick="toggleAll(false)">全部折叠</button>
</div>

<main id="patterns"></main>

<footer class="footer">
  基于 superpowers/skills/ 源码生成 &mdash; 面向理解五层防御框架的开发者
</footer>

</div>

<script>
// ============================================================
// DATA: All 11 design patterns extracted from skill source code
// ============================================================

const patterns = [
// ─────────────────────────────────────────────────────────────
// 1. Iron Law
// ─────────────────────────────────────────────────────────────
{
  id: "iron-law",
  num: "01",
  name: "Iron Law",
  nameCN: "铁律声明",
  layers: ["l1"],
  principles: ["Authority"],
  skills: [
    { name: "test-driven-development", primary: true },
    { name: "systematic-debugging", primary: true },
    { name: "verification-before-completion", primary: true },
    { name: "writing-skills", primary: true }
  ],
  definition: "用大写代码块（fence block）声明一条不可违反的绝对规则。铁律声明 (Iron Law) 使用祈使句、全大写关键词和零例外声明，通过 <strong>Authority</strong> 说服原则消除决策疲劳和合理化空间。它通常出现在 Skill 的 概述（Overview） 之后、流程说明之前，作为整个 Skill 的行为锚点。",
  whenToUse: "当 Skill 要求代理在压力下（时间压力、沉没成本、疲劳）仍然必须遵守某条核心规则时。适用于所有纪律执行型 Skill（TDD、调试、验证、技能编写）。",
  examples: [
    {
      title: "TDD Iron Law",
      titleCN: "TDD 铁律",
      source: "skills/test-driven-development/SKILL.md:33-45",
      code: `<span class="hl">NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST</span>

Write code before the test? Delete it. Start over.

<span class="hl">No exceptions:</span>
- Don't keep it as "reference"
- Don't "adapt" it while writing tests
- Don't look at it
- Delete means delete

Implement fresh from tests. Period.`,
      translation: `<span class="hl">没有失败的测试，就不能写生产代码</span>

先写了代码再补测试？删掉代码，从头来过。

<span class="hl">没有例外：</span>
- 不要把它留着当"参考"
- 不要在写测试的时候"改造"它
- 不要看它
- 删除就是彻底删除

完全从测试出发实现代码。就这样。`
    },
    {
      title: "Systematic Debugging Iron Law",
      titleCN: "系统化调试铁律",
      source: "skills/systematic-debugging/SKILL.md:18-21",
      code: `<span class="hl">NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST</span>

If you haven't completed Phase 1, you cannot propose fixes.`,
      translation: `<span class="hl">没有先完成根因调查，就不能提出修复方案</span>

如果你没有完成第一阶段（根因调查），就不能提出任何修复建议。`
    },
    {
      title: "Verification Iron Law",
      titleCN: "验证铁律",
      source: "skills/verification-before-completion/SKILL.md:18-21",
      code: `<span class="hl">NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE</span>

If you haven't run the verification command in this message,
you cannot claim it passes.`,
      translation: `<span class="hl">没有新鲜的验证证据，就不能声称任务完成</span>

如果你在这条消息中没有运行验证命令，就不能声称它通过了。`
    },
    {
      title: "Writing Skills Iron Law",
      titleCN: "编写 Skill 铁律",
      source: "skills/writing-skills/SKILL.md:376-393",
      code: `<span class="hl">NO SKILL WITHOUT A FAILING TEST FIRST</span>

Write skill before testing? Delete it. Start over.
Edit skill without testing? Same violation.

<span class="hl">No exceptions:</span>
- Not for "simple additions"
- Not for "just adding a section"
- Not for "documentation updates"`,
      translation: `<span class="hl">没有先写失败的测试，就不能写 Skill</span>

先写 Skill 再测试？删掉它，从头来过。
修改 Skill 后没有测试？同样算违规。

<span class="hl">没有例外：</span>
- 不是"简单的添加"
- 不是"只是加一个章节"
- 不是"文档更新"`
    }
  ]
},

// ─────────────────────────────────────────────────────────────
// 2. Anti-Rationalization Table
// ─────────────────────────────────────────────────────────────
{
  id: "anti-rationalization-table",
  num: "02",
  name: "Anti-Rationalization Table",
  nameCN: "反合理化表格",
  layers: ["l2"],
  principles: ["Authority", "Social Proof"],
  skills: [
    { name: "test-driven-development", primary: true },
    { name: "systematic-debugging", primary: true },
    { name: "verification-before-completion", primary: true },
    { name: "writing-skills", primary: true },
    { name: "using-superpowers", primary: true },
    { name: "receiving-code-review", primary: false }
  ],
  definition: "以两列表格（| Excuse | Reality |）穷举代理在压力下可能产生的合理化借口，并为每一个借口提供直截了当的现实反驳。这是 <strong>L2 反合理化层</strong> 的核心工具，通过 <strong>Authority</strong>（断言式反驳）和 <strong>Social Proof</strong>（\"Every time\"、普遍化陈述）双重原则封堵合理化路径。",
  whenToUse: "纪律执行型 Skill 的必备组件。在 RED 阶段（基线测试）中收集代理实际使用的合理化话术，然后在 REFACTOR 阶段逐一添加到表格中。也适用于代理容易找借口跳过的流程步骤。",
  examples: [
    {
      title: "TDD Rationalizations",
      titleCN: "TDD 合理化借口",
      source: "skills/test-driven-development/SKILL.md:258-270",
      code: `| <span class="bad">Excuse</span> | <span class="good">Reality</span> |
|--------|---------|
| "Too simple to test" | Simple code breaks. Test takes 30 seconds. |
| "I'll test after" | Tests passing immediately prove nothing. |
| "Tests after achieve same goals" | Tests-after = "what does this do?" Tests-first = "what should this do?" |
| "Deleting X hours is wasteful" | Sunk cost fallacy. Keeping unverified code is technical debt. |
| "Keep as reference, write tests first" | You'll adapt it. That's testing after. Delete means delete. |`,
      translation: `| <span class="bad">借口</span> | <span class="good">现实</span> |
|--------|---------|
| "太简单了，不需要测试" | 简单的代码也会出错。写个测试只需 30 秒。 |
| "我之后再测试" | 测试立刻通过只能证明一件事：什么都没证明。 |
| "之后测试也能达到相同目标" | 先写代码后测试 = "这段代码在干什么？" 先测试后代码 = "这段代码应该干什么？" |
| "删掉 X 小时的工作太浪费了" | 沉没成本谬误。保留未经验证的代码就是技术债务。 |
| "留着当参考，先写测试" | 你会不自觉地改造它，那还是先写代码后测试。删除就是彻底删除。 |`
    },
    {

// ============================================================
// RENDER
// ============================================================

const tocGrid = document.getElementById('tocGrid');
const patternsEl = document.getElementById('patterns');
const searchInput = document.getElementById('searchInput');

// Build TOC
patterns.forEach(p => {
  const a = document.createElement('a');
  a.className = 'toc-link';
  a.href = '#' + p.id;
  a.dataset.id = p.id;
  a.innerHTML = `<span class="toc-num">${p.num}</span>${p.name}`;
  a.onclick = (e) => { e.preventDefault(); document.getElementById(p.id).scrollIntoView({behavior:'smooth',block:'start'}); };
  tocGrid.appendChild(a);
});

// Build pattern cards
patterns.forEach(p => {
  const card = document.createElement('div');
  card.className = 'pattern-card';
  card.id = p.id;
  card.dataset.search = `${p.name} ${p.nameCN} ${p.skills.map(s=>s.name).join(' ')} ${p.definition}`.toLowerCase();

  const layerBadges = p.layers.map(l => `<span class="layer-badge ${l}">${l.toUpperCase()}</span>`).join('');
  const principleBadges = p.principles.map(pr => `<span class="layer-badge principle">${pr}</span>`).join('');

  card.innerHTML = `
    <div class="pattern-header" onclick="toggleCard(this)">
      <div class="pattern-title-row">
        <span class="pattern-num">${p.num}</span>
        <span class="pattern-name">${p.nameCN} (${p.name})</span>
        <span style="color:var(--text-tertiary);font-size:0.8rem;"></span>
      </div>
      <div class="pattern-badges">${layerBadges}${principleBadges}</div>
      <span class="pattern-arrow">&#9660;</span>
    </div>
    <div class="pattern-body">
      <div class="pattern-section">
        <div class="section-label">定义</div>
        <div class="pattern-def">${p.definition}</div>
      </div>

      <div class="pattern-section">
        <div class="section-label accent">使用场景</div>
        <div class="pattern-def">${p.whenToUse}</div>
      </div>

      <div class="pattern-section">
        <div class="section-label">涉及的 Skill</div>
        <div class="skill-tags">
          ${p.skills.map(s => `<span class="skill-tag${s.primary?' primary':''}">${s.name}</span>`).join('')}
        </div>
      </div>

      <div class="pattern-section">
        <div class="section-label accent">源码示例 (${p.examples.length})</div>
        ${p.examples.map((ex, i) => `
          <button class="sub-toggle" onclick="toggleSub(this)">
            <span class="sub-arrow">&#9654;</span>
            ${ex.titleCN ? ex.titleCN + ' / ' : ''}${ex.title}
          </button>
          <div class="sub-content">
            <div class="code-block">${ex.code}</div>
            <div class="code-source"><span class="file-ref">${ex.source}</span></div>
            ${ex.translation ? `<div style="margin-top:0.75rem;"><div class="section-label" style="margin-bottom:0.4rem;">中文译文</div><div class="code-block" style="background:rgba(245,158,11,0.04);border-color:rgba(245,158,11,0.12);">${ex.translation}</div></div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  patternsEl.appendChild(card);
});

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function toggleSub(btn) {
  btn.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.pattern-card').forEach(c => {
    if (open) c.classList.add('open');
    else c.classList.remove('open');
  });
}

// Search
searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.pattern-card').forEach(card => {
    if (!q || card.dataset.search.includes(q)) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
  // Update TOC
  document.querySelectorAll('.toc-link').forEach(link => {
    const card = document.getElementById(link.dataset.id);
    if (card && card.classList.contains('hidden')) {
      link.style.opacity = '0.3';
    } else {
      link.style.opacity = '1';
    }
  });
});

// Open first pattern by default
document.querySelector('.pattern-card').classList.add('open');
</script>
