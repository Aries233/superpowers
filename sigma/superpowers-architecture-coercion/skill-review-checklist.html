<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill 审查清单</title>
<style>
:root {
  --bg: #08080c;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(255,255,255,0.12);
  --text: #ededef;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent-1: #f59e0b;
  --accent-2: #ef4444;
  --accent-3: #34d399;
  --accent-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --cyan: #06b6d4;
  --purple: #a855f7;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  --font-sans: -apple-system, 'Inter', system-ui, sans-serif;
  --radius: 12px;
  --transition: cubic-bezier(0.4, 0, 0.2, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(245,158,11,0.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(239,68,68,0.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{max-width:880px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

/* Header */
.header{text-align:center;padding:3rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem}
.header h1{font-size:2rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.02em;margin-bottom:0.75rem}
.header .subtitle{color:var(--text-secondary);font-size:0.95rem;max-width:600px;margin:0 auto}

/* Score Bar */
.score-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:2rem;backdrop-filter:blur(12px);display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.score-bar-wrap .label{font-size:0.78rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-tertiary);font-weight:600;white-space:nowrap}
.score-track{flex:1;min-width:200px;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;position:relative}
.score-fill{height:100%;border-radius:4px;background:var(--accent-gradient);transition:width 0.5s var(--transition);width:0%}
.score-text{font-family:var(--font-mono);font-size:0.85rem;color:var(--text);white-space:nowrap;min-width:60px;text-align:right}

/* Progress per section */
.section-scores{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.section-score{display:flex;align-items:center;gap:0.4rem;padding:0.25rem 0.65rem;border-radius:6px;font-size:0.72rem;background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all 0.2s var(--transition)}
.section-score:hover{border-color:var(--border-accent);background:var(--surface-hover)}
.section-score .ss-num{font-family:var(--font-mono);color:var(--text-tertiary)}
.section-score .ss-pct{font-weight:600}
.section-score.complete .ss-pct{color:var(--green)}

/* Controls */
.controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem}
.ctrl-left{display:flex;gap:0.5rem}
.ctrl-btn{padding:0.35rem 0.75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:0.75rem;cursor:pointer;transition:all 0.2s var(--transition);font-family:var(--font-sans)}
.ctrl-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-accent)}
.ctrl-btn.danger{color:var(--red);border-color:rgba(239,68,68,0.2)}
.ctrl-btn.danger:hover{background:rgba(239,68,68,0.08)}

/* Checklist Section */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;backdrop-filter:blur(12px);overflow:hidden;transition:border-color 0.3s var(--transition)}
.section-card:hover{border-color:var(--border-accent)}
.section-header{display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.section-header:hover{background:var(--surface-hover)}
.section-num{font-family:var(--font-mono);font-size:0.7rem;color:var(--accent-1);flex-shrink:0}
.section-title{font-size:0.95rem;font-weight:600;flex:1}
.section-badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.15rem 0.5rem;border-radius:5px;font-size:0.68rem;font-weight:600;border:1px solid}
.section-badge.s-struct{background:rgba(245,158,11,0.08);color:var(--amber);border-color:rgba(245,158,11,0.15)}
.section-badge.s-persuade{background:rgba(239,68,68,0.08);color:var(--red);border-color:rgba(239,68,68,0.15)}
.section-badge.s-defense{background:rgba(52,211,153,0.08);color:var(--green);border-color:rgba(52,211,153,0.15)}
.section-badge.s-rational{background:rgba(6,182,212,0.08);color:var(--cyan);border-color:rgba(6,182,212,0.15)}
.section-badge.s-trigger{background:rgba(168,85,247,0.08);color:var(--purple);border-color:rgba(168,85,247,0.15)}
.section-badge.s-ctx{background:rgba(255,255,255,0.06);color:var(--text-secondary);border-color:var(--border)}
.section-arrow{font-size:0.75rem;color:var(--text-tertiary);transition:transform 0.3s var(--transition)}
.section-card.open .section-arrow{transform:rotate(180deg)}
.section-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)}
.section-card.open .section-body{display:block}

/* Section description */
.section-desc{color:var(--text-secondary);font-size:0.83rem;margin:0.75rem 0 1rem;line-height:1.7}

/* Checklist Items */
.check-item{display:flex;align-items:flex-start;gap:0.65rem;padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.check-item:last-child{border-bottom:none}
.check-item.checked{opacity:0.55}
.check-item.checked .check-text{text-decoration:line-through;color:var(--text-tertiary)}
.check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-accent);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s var(--transition);background:transparent}
.check-box:hover{border-color:var(--accent-1);background:rgba(245,158,11,0.06)}
.check-item.checked .check-box{background:var(--green);border-color:var(--green)}
.check-item.checked .check-box::after{content:'✓';color:#000;font-size:11px;font-weight:700}
.check-content{flex:1;min-width:0}
.check-text{font-size:0.85rem;color:var(--text);line-height:1.6}
.check-text code{font-family:var(--font-mono);font-size:0.78rem;background:rgba(255,255,255,0.06);padding:0.1em 0.35em;border-radius:3px;color:var(--cyan)}
.check-sub{color:var(--text-tertiary);font-size:0.75rem;margin-top:0.2rem;line-height:1.5}
.check-sub strong{color:var(--text-secondary);font-weight:500}
.check-tag{display:inline-flex;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.65rem;font-weight:600;margin-left:0.35rem;vertical-align:middle}
.check-tag.required{background:rgba(239,68,68,0.1);color:var(--red)}
.check-tag.recommended{background:rgba(245,158,11,0.1);color:var(--amber)}

/* Severity indicators */
.severity{font-size:0.65rem;font-family:var(--font-mono);padding:0.1rem 0.35rem;border-radius:3px;flex-shrink:0;margin-top:3px}
.severity.critical{background:rgba(239,68,68,0.12);color:var(--red)}
.severity.important{background:rgba(245,158,11,0.12);color:var(--amber)}
.severity.minor{background:rgba(255,255,255,0.06);color:var(--text-tertiary)}

/* Example callout */
.example-callout{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;margin-top:0.5rem;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.example-callout .ex-good{color:var(--green)}
.example-callout .ex-bad{color:var(--red)}
.example-callout .ex-hl{background:rgba(245,158,11,0.1);display:inline;padding:0.1em 0.2em;border-radius:3px}

/* Sub-toggle for examples */
.ex-toggle{display:inline-flex;align-items:center;gap:0.3rem;padding:0.15rem 0.45rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-tertiary);font-size:0.68rem;cursor:pointer;margin-top:0.25rem;transition:all 0.2s var(--transition);font-family:var(--font-sans)}
.ex-toggle:hover{border-color:var(--border-accent);color:var(--text-secondary)}
.ex-toggle.open{color:var(--accent-1);border-color:rgba(245,158,11,0.2)}
.ex-content{display:none;margin-top:0.5rem}
.ex-toggle.open+.ex-content{display:block}

/* Footer */
.footer{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);text-align:center;color:var(--text-tertiary);font-size:0.78rem}

/* Responsive */
@media(max-width:640px){
  .container{padding:1rem}
  .header h1{font-size:1.5rem}
  .score-bar-wrap{flex-direction:column;align-items:stretch}
  .section-body{padding:0 1rem 1rem}
  .controls{flex-direction:column;align-items:stretch}
  .ctrl-left{justify-content:center}
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>Skill 审查清单</h1>
  <p class="subtitle">针对任意 Skill 的系统性质量审计 — 6 个维度、50+ 检查项、来源可追溯的标准</p>
</header>

<div class="score-bar-wrap">
  <span class="label">总体</span>
  <div class="score-track"><div class="score-fill" id="scoreFill"></div></div>
  <span class="score-text" id="scoreText">0 / 0</span>
</div>

<div class="section-scores" id="sectionScores"></div>

<div class="controls">
  <div class="ctrl-left">
    <button class="ctrl-btn" onclick="toggleAllSections(true)">全部展开</button>
    <button class="ctrl-btn" onclick="toggleAllSections(false)">全部折叠</button>
  </div>
  <button class="ctrl-btn danger" onclick="resetAll()">&#x2715; 重置</button>
</div>

<main id="checklist"></main>

<footer class="footer">
  标准提取自 superpowers/skills/ 源码 — Skill 设计参考 第 3 部分
</footer>

</div>

<script>
// ============================================================
// DATA
// ============================================================

const sections = [
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 1. 结构完整性
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id: "structural",
  num: "01",
  title: "结构完整性",
  titleCN: "结构完整性",
  badgeClass: "s-struct",
  description: "验证 Skill 是否包含所有必需的结构组件并遵循格式规范。基于 skills/writing-skills/SKILL.md 和 agentskills.io 规范。",
  items: [
    {
      text: "YAML frontmatter 包含必需的 <code>name</code> 和 <code>description</code> 字段",
      sub: "总计不超过 1024 个字符。<code>name</code> 仅使用字母、数字和连字符。",
      tag: "required", severity: "critical",
      example: { good: `---\nname: condition-based-waiting\ndescription: Use when tests have race conditions,\n  timing dependencies, or pass/fail inconsistently\n---`, bad: `---\nname: Async Test Helpers (v2)\ndescription: For async testing\n---` }
    },
    {
      text: "<code>description</code> 以 \"Use when...\" 开头，且仅描述<em>触发条件</em>",
      sub: "绝不要总结 skill 的流程或工作方式。描述 = 何时使用，而非做了什么。",
      tag: "required", severity: "critical",
      example: { good: `description: Use when executing implementation plans\n  with independent tasks in the current session`, bad: `description: Use when executing plans - dispatches\n  subagent per task with code review between tasks\n  ^^^ workflow summary - Claude follows this instead of reading skill` }
    },
    {
      text: "<code>description</code> 使用第三人称书写",
      sub: "会被注入系统提示中。第一人称（\"I can help\"）属于错误的上下文。",
      tag: "required", severity: "important",
      example: { good: `description: Use when encountering any bug, test failure,\n  or unexpected behavior, before proposing fixes`, bad: `description: I can help you with debugging when\n  tests are flaky` }
    },
    {
      text: "描述使用具体的触发条件、症状和场景",
      sub: "包含错误消息、症状、同义词、工具名称。除非 skill 是特定技术的，否则应与具体技术无关。",
      tag: "recommended", severity: "important",
      example: { good: `description: Use when tests have race conditions,\n  timing dependencies, or pass/fail inconsistently`, bad: `description: For async testing` }
    },
    {
      text: "包含 <code># Overview</code> 部分，用 1-2 句话阐述核心原则",
      sub: "这是未来的 Claude 加载 skill 后首先扫描的内容。",
      tag: "required", severity: "critical"
    },
    {
      text: "包含 <code>## When to Use</code> 部分，列出具体症状和反模式",
      sub: "用要点列表列出症状。对于纪律型 skill，应包含\"不要在以下情况跳过\"和\"尤其在以下情况使用\"。",
      tag: "required", severity: "critical"
    },
    {
      text: "包含 <code>## Common Mistakes</code> 或 <code>## Red Flags</code> 部分",
      sub: "帮助 agent 自我检查。使用表格格式（| 错误 | 修正 |）或带补救措施的要点列表。",
      tag: "required", severity: "important"
    },
    {
      text: "代码示例使用单一语言、真实场景，并解释原因",
      sub: "一个优秀的示例胜过许多平庸的示例。根据领域选择语言：测试用 TS/JS，调试用 Shell/Python。",
      tag: "recommended", severity: "minor"
    },
    {
      text: "token 预算与加载频率匹配",
      sub: "入门型：<150 词。高频加载：<200 词。其他：<500 词。使用 <code>wc -w</code> 测量。",
      tag: "recommended", severity: "important"
    },
    {
      text: "包含快速参考表格或章节，便于快速浏览",
      sub: "使用表格、清单或简短的要点列表，以便在执行过程中快速查阅。",
      tag: "recommended", severity: "minor"
    }
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 2. 说服原则合规
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id: "persuasion",
  num: "02",
  title: "说服原则合规",
  titleCN: "说服原则合规",
  badgeClass: "s-persuade",
  description: "验证 Skill 使用了适合其类型的说服原则，并避免适得其反的原则。基于 skills/writing-skills/persuasion-principles.md（Cialdini 2021; Meincke et al. 2025）。",
  items: [
    {
      text: "纪律执行型 skill 使用<strong>权威</strong>语言",
      sub: "\"YOU MUST\"、\"NEVER\"、\"Always\"、\"No exceptions\"。消除决策疲劳。使用祈使语气，而非含糊其辞。",
      tag: "required", severity: "critical",
      example: { good: `<span class="ex-good">Write code before test? Delete it. Start over.\nNo exceptions.</span>`, bad: `<span class="ex-bad">Consider writing tests first when feasible.\nIt's generally a good practice.</span>` }
    },
    {
      text: "纪律执行型 skill 使用<strong>承诺</strong>机制",
      sub: "要求宣布、强制明确选择或使用 TodoWrite 追踪。创建一致性压力。",
      tag: "required", severity: "critical",
      example: { good: `<span class="ex-good">Announce at start: "I'm using the writing-plans\nskill to create the implementation plan."</span>`, bad: `<span class="ex-bad">Consider letting your partner know which\nskill you're using.</span>` }
    },
    {
      text: "纪律执行型 skill 使用<strong>社会认同</strong>进行规范强化",
      sub: "\"Every time\"、\"Always\"、通用模式。确立偏离是例外而非常态。",
      tag: "required", severity: "important",
      example: { good: `<span class="ex-good">Checklists without TodoWrite tracking =\nsteps get skipped. Every time.</span>`, bad: `<span class="ex-bad">Some people find TodoWrite helpful\nfor checklists.</span>` }
    },
    {
      text: "<strong>好感</strong>原则未用于合规执行",
      sub: "与诚实的反馈文化相冲突。会导致阿谀奉承。\"You're absolutely right!\" 是 CLAUDE.md 违规行为。",
      tag: "required", severity: "critical",
      example: { good: `<span class="ex-good">Fixed. [Brief description of what changed]</span>`, bad: `<span class="ex-bad">You're absolutely right! Great point!\nLet me implement that now.</span>` }
    },
    {
      text: "<strong>互惠</strong>原则未使用（或极少使用）",
      sub: "可能让人感到被操纵。在 skill 中几乎不需要。其他原则更有效。",
      tag: "required", severity: "important"
    },
    {
      text: "说服原则的选择与 skill 类型匹配",
      sub: "纪律型：权威 + 承诺 + 社会认同。指导型：适度权威 + 一致性。协作型：一致性 + 承诺。参考型：仅清晰性。",
      tag: "required", severity: "important"
    },
    {
      text: "明确的规则减少了合理化的机会",
      sub: "\"YOU MUST\" 消除决策疲劳。绝对性语言消除了\"这是例外吗？\"的疑问。",
      tag: "recommended", severity: "important",
      example: { good: `<span class="ex-good">NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST</span>`, bad: `<span class="ex-bad">It's recommended to write tests before\nproduction code when possible.</span>` }
    },
    {
      text: "主动使用不超过 2-3 个说服原则",
      sub: "不要全部使用七个。过度使用会稀释每个原则的效果，并造成语气不协调。",
      tag: "recommended", severity: "minor"
    }
  ]
},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 3. 防御层覆盖
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{
  id: "defense",
  num: "03",
  title: "防御层覆盖",
  titleCN: "防御层覆盖",
  badgeClass: "s-defense",
  description: "验证 Skill 是否覆盖了五层防御框架中的适当层级（L0 注入 → L1 锁定 → L2 反合理化 → L3 顺序门控 → L4 证据验证）。",
  items: [
    {
      text: "<strong>L0 注入：</strong>Skill 可以被未来的 Claude 实例发现和加载",
      sub: "CSO（Claude Search Optimization）：description 使用可搜索的关键词，name 使用主动语态（动词优先），skill 位于扁平命名空间中。",
      tag: "required", severity: "critical"
    },
    {

// ============================================================
// RENDER
// ============================================================

const checklistEl = document.getElementById('checklist');
const scoreFill = document.getElementById('scoreFill');
const scoreText = document.getElementById('scoreText');
const sectionScoresEl = document.getElementById('sectionScores');

let totalItems = 0;
let checkedItems = new Set();

// Count total
sections.forEach(s => { totalItems += s.items.length; });

// Render sections
sections.forEach(s => {
  const card = document.createElement('div');
  card.className = 'section-card open';
  card.id = s.id;

  card.innerHTML = `
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-num">${s.num}</span>
      <span class="section-title">${s.title}</span>
      <span class="section-badge ${s.badgeClass}">${s.items.length} 项检查</span>
      <span class="section-arrow">&#9660;</span>
    </div>
    <div class="section-body">
      <div class="section-desc">${s.description}</div>
      ${s.items.map((item, i) => {
        const uid = `${s.id}-${i}`;
        return `
        <div class="check-item" id="item-${uid}">
          <div class="check-box" onclick="toggleCheck('${uid}',this)"></div>
          <div class="check-content">
            <div class="check-text">
              ${item.text}
              ${item.tag ? `<span class="check-tag ${item.tag}">${item.tag}</span>` : ''}
              ${item.severity ? `<span class="severity ${item.severity}">${item.severity}</span>` : ''}
            </div>
            ${item.sub ? `<div class="check-sub">${item.sub}</div>` : ''}
            ${item.example ? `
              <button class="ex-toggle" onclick="toggleEx(this)">示例</button>
              <div class="ex-content">
                <div class="example-callout">${item.example.good ? `<span class="ex-good">&#10003; 正确:</span>\n${item.example.good}` : ''}${item.example.bad ? `\n\n<span class="ex-bad">&#10007; 错误:</span>\n${item.example.bad}` : ''}</div>
              </div>
            ` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  checklistEl.appendChild(card);
});

// Section score pills
sections.forEach(s => {
  const pill = document.createElement('div');
  pill.className = 'section-score';
  pill.id = `ss-${s.id}`;
  pill.onclick = () => document.getElementById(s.id).scrollIntoView({behavior:'smooth',block:'start'});
  pill.innerHTML = `<span class="ss-num">${s.num}</span>${s.titleCN} <span class="ss-pct" id="ss-pct-${s.id}">0%</span>`;
  sectionScoresEl.appendChild(pill);
});

function updateScore() {
  const total = totalItems;
  const checked = checkedItems.size;
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;
  scoreFill.style.width = pct + '%';
  scoreText.textContent = `${checked} / ${total}`;

  sections.forEach(s => {
    let secTotal = s.items.length;
    let secChecked = 0;
    s.items.forEach((_, i) => {
      if (checkedItems.has(`${s.id}-${i}`)) secChecked++;
    });
    const secPct = secTotal > 0 ? Math.round(secChecked / secTotal * 100) : 0;
    const el = document.getElementById(`ss-pct-${s.id}`);
    if (el) el.textContent = secPct + '%';
    const pill = document.getElementById(`ss-${s.id}`);
    if (pill) pill.classList.toggle('complete', secPct === 100);
  });

  // Persist
  try { localStorage.setItem('skill-checklist-state', JSON.stringify([...checkedItems])); } catch(e) {}
}

function toggleCheck(uid, box) {
  const item = document.getElementById('item-' + uid);
  if (checkedItems.has(uid)) {
    checkedItems.delete(uid);
    item.classList.remove('checked');
  } else {
    checkedItems.add(uid);
    item.classList.add('checked');
  }
  updateScore();
}

function toggleSection(header) {
  header.parentElement.classList.toggle('open');
}

function toggleEx(btn) {
  btn.classList.toggle('open');
}

function toggleAllSections(open) {
  document.querySelectorAll('.section-card').forEach(c => {
    open ? c.classList.add('open') : c.classList.remove('open');
  });
}

function resetAll() {
  if (!confirm('重置所有已勾选项？')) return;
  checkedItems.clear();
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('checked'));
  updateScore();
}

// Restore state
try {
  const saved = JSON.parse(localStorage.getItem('skill-checklist-state') || '[]');
  saved.forEach(uid => {
    if (document.getElementById('item-' + uid)) {
      checkedItems.add(uid);
      document.getElementById('item-' + uid).classList.add('checked');
    }
  });
} catch(e) {}

updateScore();
</script>
</body>
</html>
